<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    <style>
      .compass { fill: none; stroke: #ecf0f1; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .log-line { stroke: #ecf0f1; stroke-width: 2.5; stroke-linecap: round; }
      .needle { fill: #e74c3c; }
      .g-letter { fill: #ecf0f1; font-family: Arial, sans-serif; font-weight: bold; font-size: 28px; }
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" />

  <!-- Compass rose -->
  <g transform="translate(50,50)">
    <circle cx="0" cy="0" r="22" class="compass" />
    <line x1="0" y1="-22" x2="0" y2="22" class="compass" />
    <line x1="-22" y1="0" x2="22" y2="0" class="compass" />
    <polygon points="0,-18 4,-4 0,0 -4,-4" class="needle" />
    <polygon points="0,18 -4,4 0,0 4,4" class="needle" />
    <polygon points="-18,0 -4,-4 0,0 -4,4" class="needle" />
    <polygon points="18,0 4,4 0,0 4,-4" class="needle" />
  </g>

  <!-- Log lines -->
  <g transform="translate(35, 35)">
    <line x1="0" y1="5" x2="30" y2="5" class="log-line" />
    <line x1="0" y1="15" x2="25" y2="15" class="log-line" />
    <line x1="0" y1="25" x2="30" y2="25" class="log-line" />
  </g>

  <!-- G initial -->
  <text x="68" y="79" class="g-letter">G</text>
</svg>
