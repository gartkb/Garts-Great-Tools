<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F87171" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FACC15" />
      <stop offset="100%" stop-color="#CA8A04" />
    </linearGradient>
  </defs>
  
  <!-- Bar Chart -->
  <rect x="14" y="40" width="8" height="16" fill="url(#bar1)" rx="2" />
  <rect x="28" y="28" width="8" height="28" fill="url(#bar2)" rx="2" />
  <rect x="42" y="16" width="8" height="40" fill="url(#bar3)" rx="2" />

  <!-- Magnifying Glass Overlay -->
  <circle cx="34" cy="28" r="14" fill="#ffffff" fill-opacity="0.15" stroke="#F1F5F9" stroke-width="4" />
  <line x1="44" y1="38" x2="56" y2="50" stroke="#F1F5F9" stroke-width="6" stroke-linecap="round" />
  <!-- Glass Reflection -->
