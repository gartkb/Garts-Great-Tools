<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xera Tanking & Movement Guide</title>
  <style>
    :root {
      --bg-dark: #1e1e24;
      --panel-bg: #2d2d38;
      --text-main: #f0f0f5;
      --accent-color: #9b59b6;
    }

    body {
      margin: 0;
      padding: 20px;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 5px;
      font-size: 1.5rem;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background-color: var(--panel-bg);
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      box-sizing: border-box;
    }

    .map-wrapper {
      position: relative;
      width: 100%;
      padding-top: 100%; /* Square Aspect Ratio */
      background-color: #111116;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 15px;
      border: 1px solid #3d3d4e;
    }

    .map-wrapper svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* UI Controls */
    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      background-color: #3e3e4f;
      color: var(--text-main);
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #505066;
    }

    button#playBtn {
      background-color: var(--accent-color);
    }

    button#playBtn:hover {
      background-color: #af73ca;
    }

    /* Info Panel */
    .info-panel {
      background-color: #1a1a22;
      padding: 12px;
      border-radius: 4px;
      border-left: 4px solid var(--accent-color);
      min-height: 75px;
    }

    .step-title {
      font-weight: bold;
      margin-bottom: 5px;
      color: #dfdfea;
    }

    .step-desc {
      font-size: 0.9rem;
      line-height: 1.4;
      color: #b0b0c5;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
      font-size: 0.8rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    /* Drifting Bloodstone Orb Animations */
    @keyframes slide-out {
      0% {
        transform: translateX(0);
        opacity: 0.1;
      }
      15% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateX(180px);
        opacity: 0;
      }
    }

    .laser-orb {
      fill: #c0392b;
      stroke: #f1c40f;
      stroke-width: 1.5;
    }

    .orb-delay-0 {
      animation: slide-out 2.4s infinite linear;
    }

    .orb-delay-1 {
      animation: slide-out 2.4s infinite linear;
      animation-delay: 1.2s;
    }
  </style>
</head>

    const groupEl = document.getElementById('group-stack');
    const tankEl = document.getElementById('tank-stack');
    const shardsGroup = document.getElementById('shards-group');
    const wellEl = document.getElementById('gravity-well');
    const laserEl = document.getElementById('center-laser');
    const bubbleEl = document.getElementById('intervention-bubble');
    const glidePathEl = document.getElementById('glide-path');
    const stepTitleEl = document.getElementById('stepTitle');
    const stepDescEl = document.getElementById('stepDesc');
    const playBtn = document.getElementById('playBtn');

    function renderStep() {
      const step = steps[currentStep];
      
      // Title and Description updates
      stepTitleEl.innerText = step.title;
      stepDescEl.innerText = step.desc;

      // Xera & Tank visibility/positions
      if (step.xera) {
        xeraEl.style.display = 'block';
        xeraEl.setAttribute('transform', `translate(${step.xera.x}, ${step.xera.y}) rotate(${step.xera.angle})`);
      } else {
        xeraEl.style.display = 'none';
      }

      if (step.tank) {
        tankEl.style.display = 'block';
        tankEl.setAttribute('transform', `translate(${step.tank.x}, ${step.tank.y})`);
      } else {
        tankEl.style.display = 'none';
      }

      // Group Position
      groupEl.setAttribute('transform', `translate(${step.group.x}, ${step.group.y})`);

      // Shards Rendering ( Diamonds mapped exactly to Clock hours )
      shardsGroup.innerHTML = '';
      step.shards.forEach(hour => {
        const coord = clockCoords[hour];
        if (coord) {
          const shard = document.createElementNS("http://www.w3.org/2000/svg", "g");
          shard.setAttribute('transform', `translate(${coord.x}, ${coord.y})`);
          
          // Outer Glow
          const glow = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          glow.setAttribute('cx', '0');
          glow.setAttribute('cy', '0');
          glow.setAttribute('r', '8');
          glow.setAttribute('fill', 'rgba(142, 68, 173, 0.4)');
          glow.setAttribute('filter', 'url(#glow-purple)');
          
          // Diamond Shape
          const shape = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
          shape.setAttribute('points', '0,-7 6,0 0,7 -6,0');
          shape.setAttribute('fill', '#9b59b6');
          shape.setAttribute('stroke', '#dfbdf2');
          shape.setAttribute('stroke-width', '1');
          
          shard.appendChild(glow);
          shard.appendChild(shape);
          shardsGroup.appendChild(shard);
        }
      });

      // Gravity Wells (Rotated to match precise tilt angles)
      if (step.wellAngle !== null) {
        wellEl.setAttribute('transform', `rotate(${step.wellAngle}, 250, 250)`);
        wellEl.style.display = 'block';
      } else {
        wellEl.style.display = 'none';
      }

      // Center Laser
      laserEl.style.display = step.laser ? 'block' : 'none';

      // Intervention Bubble
      if (step.bubble) {
        bubbleEl.setAttribute('cx', step.group.x);
        bubbleEl.setAttribute('cy', step.group.y);
        bubbleEl.style.display = 'block';
      } else {
        bubbleEl.style.display = 'none';
      }

      // Gliding Path indicator
      glidePathEl.style.display = step.intermission ? 'block' : 'none';
    }

    function nextStep() {
      currentStep = (currentStep + 1) % steps.length;
      renderStep();
    }

    // Previous step
    function prevStep() {
      currentStep = (currentStep - 1 + steps.length) % steps.length;
      renderStep();
    }

    function resetTimeline() {
      pauseTimeline();
      currentStep = 0;
      renderStep();
    }

    function togglePlay() {
      if (playInterval) {
        pauseTimeline();
      } else {
        playTimeline();
      }
    }

    function playTimeline() {
      playBtn.innerText = "Pause █";
      playInterval = setInterval(() => {
        nextStep();
      }, 5000); // 5 seconds per frame transition
    }

    function pauseTimeline() {
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
      }
      playBtn.innerText = "Play ▶";
    }

    // Initial load
    renderStep();
  </script>
</body>
</html>
